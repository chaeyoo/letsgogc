<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RA-Assistant · 제약 규제업무 AI 어시스턴트</title>
<style>
  :root {
    --bg: #0f1720; --panel: #16212e; --panel2: #1c2937; --line: #26374a;
    --text: #e6edf3; --muted: #8aa0b4; --accent: #33c3a6; --accent2: #4f9dff;
    --user: #234a63; --warn: #e0a458;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Segoe UI", "Noto Sans KR", sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { padding: 14px 20px; border-bottom: 1px solid var(--line); background: var(--panel);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0; font-weight: 650; }
  header .sub { color: var(--muted); font-size: 12px; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--line); }
  .badge.llm { color: #062; background: var(--accent); border-color: var(--accent); font-weight: 700; }
  .badge.offline { color: var(--warn); border-color: var(--warn); }
  main { flex: 1; overflow-y: auto; padding: 20px; max-width: 860px; width: 100%; margin: 0 auto; }
  .msg { margin-bottom: 16px; display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble { padding: 12px 15px; border-radius: 12px; max-width: 88%; white-space: pre-wrap;
    line-height: 1.6; font-size: 14px; }
  .msg.user .bubble { background: var(--user); }
  .msg.bot .bubble { background: var(--panel); border: 1px solid var(--line); }
  .meta { margin-top: 9px; display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  .pill.ok { color: var(--accent); border-color: var(--accent); }
  .pill.warn { color: var(--warn); border-color: var(--warn); }
  .trace { margin-top: 9px; font-size: 12px; color: var(--muted); }
  .trace .tool { display: inline-block; background: var(--panel2); border: 1px solid var(--line);
    border-radius: 6px; padding: 2px 8px; margin: 2px 4px 2px 0; }
  .cites { margin-top: 10px; border-top: 1px dashed var(--line); padding-top: 8px; }
  .cite { font-size: 12px; color: var(--muted); margin: 3px 0; }
  .cite b { color: var(--accent2); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .chip { font-size: 12px; padding: 6px 11px; border: 1px solid var(--line); border-radius: 999px;
    background: var(--panel); cursor: pointer; color: var(--text); }
  .chip:hover { border-color: var(--accent); }
  footer { border-top: 1px solid var(--line); padding: 14px 20px; background: var(--panel); }
  .inputrow { display: flex; gap: 10px; max-width: 860px; margin: 0 auto; }
  input#q { flex: 1; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--panel2); color: var(--text); font-size: 14px; }
  button#send { padding: 0 20px; border-radius: 10px; border: none; background: var(--accent);
    color: #052; font-weight: 700; cursor: pointer; font-size: 14px; }
  button#send:disabled { opacity: .5; cursor: default; }
  .empty { color: var(--muted); text-align: center; margin-top: 40px; font-size: 13px; line-height: 1.8; }
</style>
</head>
<body>
  <header>
    <h1>🧬 RA-Assistant</h1>
    <span class="sub">제약 규제업무(RA·PV) AI 어시스턴트 · RAG + MCP + Agent</span>
    <span id="mode" class="badge">연결 중…</span>
  </header>

  <main id="log">
    <div class="empty" id="empty">
      규제 절차·기한·GMP·라벨링·약물감시 등 사내 규제문서를 근거로 답합니다.<br/>
      에이전트가 MCP 도구(문서검색·마감일·체크리스트·이상사례 트리아지·보고서 초안)를 자율 호출합니다.<br/>
      아래 예시 질문을 눌러보세요.
    </div>
    <div class="chips" id="chips"></div>
  </main>

  <footer>
    <div class="inputrow">
      <input id="q" placeholder="예) 중대한 이상사례는 며칠 안에 보고해야 하나요?" autocomplete="off" />
      <button id="send">전송</button>
    </div>
  </footer>

<script>
const EXAMPLES = [
  "품목허가 심사 기간은 얼마나 걸리나요?",
  "중대한 이상사례는 며칠 안에 보고해야 하나요?",
  "환자가 복용 후 아나필락시스로 입원했습니다. 언제까지 보고해야 하나요?",
  "45세 남성 환자가 A정 복용 후 두드러기로 입원, 중단 후 호전됐습니다. 의사 보고 케이스인데 KAERS 보고서 초안 만들어줘",
  "이번 주 마감 임박한 규제 업무 알려줘",
  "변경허가 준비 체크리스트 알려줘",
  "GMP 데이터 완전성(ALCOA) 원칙이 뭐야?",
];
const log = document.getElementById('log');
const empty = document.getElementById('empty');
const chips = document.getElementById('chips');
const input = document.getElementById('q');
const sendBtn = document.getElementById('send');

EXAMPLES.forEach(x => {
  const c = document.createElement('div');
  c.className = 'chip'; c.textContent = x;
  c.onclick = () => { input.value = x; send(); };
  chips.appendChild(c);
});

fetch('/health').then(r => r.json()).then(h => {
  const b = document.getElementById('mode');
  b.textContent = h.mode === 'llm' ? 'LLM 모드' : '오프라인 모드';
  b.className = 'badge ' + h.mode;
  b.title = h.banner + ` · 문서 ${h.rag.docs} · 청크 ${h.rag.chunks}`;
}).catch(() => { document.getElementById('mode').textContent = '오프라인'; });

function esc(s){ return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function addMsg(role, text) {
  empty.style.display = 'none';
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  wrap.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
  return wrap.querySelector('.bubble');
}

function renderBot(bubble, data) {
  let html = esc(data.answer);
  // 근거 상태 배지: 근거 기반 답변 vs 근거 없음(abstention)
  const gb = data.grounded === false
    ? `<span class="pill warn">⚠ 근거 없음(추측 안 함)</span>`
    : `<span class="pill ok">✓ 근거 기반</span>`;
  const lat = (typeof data.latency_ms === 'number')
    ? `<span class="pill">⚡ ${data.latency_ms} ms</span>` : '';
  // PII 마스킹 배지: 개인정보가 외부 LLM/로그로 나가기 전에 마스킹됐음을 표시
  const red = (data.redactions && data.redactions.length)
    ? `<span class="pill warn">🔒 개인정보 마스킹: ${data.redactions.map(r => `${esc(r.type)} ${r.count}건`).join(', ')}</span>` : '';
  // 사후 검증 배지: 답변 속 수치·날짜·방향 한정어가 근거/도구 결과와 대조됐음을 표시
  let ver = '';
  if (data.verification && typeof data.verification.ok === 'boolean') {
    const v = data.verification;
    if (v.ok) {
      ver = v.checked ? `<span class="pill ok">🔍 수치 검증 통과 (${v.checked}건 대조)</span>` : '';
    } else {
      const qOrigin = new Set(v.question_origin || []);
      const halluc = (v.unsupported || []).filter(c => !qOrigin.has(c));
      const parts = [];
      if (halluc.length) parts.push(`미확인 ${halluc.map(esc).join(', ')}`);
      if (qOrigin.size) parts.push(`질문 전제 확인 필요 ${[...qOrigin].map(esc).join(', ')}`);
      if ((v.direction_conflicts || []).length) parts.push(`방향 반대 ${v.direction_conflicts.map(esc).join(', ')}`);
      if ((v.superseded_cited || []).length) parts.push(`폐지본 인용 ${v.superseded_cited.map(esc).join(', ')}`);
      ver = `<span class="pill warn">🔍 검증 경고: ${parts.join(' · ')}</span>`;
    }
  }
  html += `<div class="meta">${gb}${lat}${red}${ver}</div>`;
  if (data.tool_calls && data.tool_calls.length) {
    html += `<div class="trace">🔧 호출한 MCP 도구: ` +
      data.tool_calls.map(t => `<span class="tool">${esc(t.name)} · ${esc(t.summary||'')}</span>`).join('') +
      `</div>`;
  }
  if (data.citations && data.citations.length) {
    html += `<div class="cites">📄 근거 출처:` +
      data.citations.map(c => {
        const ver = c.version ? ` <span style="opacity:.55">v${esc(c.version)} · 시행 ${esc(c.effective_date||'')}</span>` : '';
        return `<div class="cite"><b>${esc(c.title||'')}</b> › ${esc(c.section||'')} <span style="opacity:.6">(${esc(c.source||'')})</span>${ver}</div>`;
      }).join('') +
      `</div>`;
  }
  bubble.innerHTML = html;
  log.scrollTop = log.scrollHeight;
}

// 멀티턴: 최근 대화 이력을 유지해 후속질문("그럼 그건?")이 맥락을 잇게 한다.
const history = [];

async function send() {
  const message = input.value.trim();
  if (!message) return;
  input.value = '';
  addMsg('user', message);
  const bubble = addMsg('bot', '⏳ 규제문서를 검색하고 있습니다…');
  sendBtn.disabled = true;
  try {
    const res = await fetch('/chat', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message, history })
    });
    const data = await res.json();
    renderBot(bubble, data);
    // 이력 갱신(최근 6턴만 유지)
    history.push({ role: 'user', content: message });
    history.push({ role: 'assistant', content: data.answer });
    while (history.length > 6) history.shift();
  } catch (e) {
    bubble.textContent = '오류가 발생했습니다: ' + e;
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}
sendBtn.onclick = send;
input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
