<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>용어 사전 복습 퀴즈 — RAPV-Assistant dictionary.md</title>
<style>
  :root {
    --bg: #f6f7f9; --card: #ffffff; --ink: #22303c; --sub: #5c6b7a;
    --line: #e3e8ee; --accent: #1f6feb; --accent-soft: #e8f0fe;
    --ok: #1a7f37; --ok-soft: #e6f4ea; --bad: #c93c37; --bad-soft: #fdeaea;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    line-height: 1.6;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 28px 16px 64px; }
  header h1 { font-size: 1.35rem; margin: 0 0 4px; }
  header p { margin: 0 0 20px; color: var(--sub); font-size: .92rem; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 22px; margin-bottom: 16px;
  }
  .parts { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 18px; }
  .chip {
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 999px; padding: 6px 14px; font-size: .88rem; cursor: pointer;
  }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary {
    background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 10px 22px; font-size: .95rem; cursor: pointer;
  }
  button.primary:disabled { opacity: .45; cursor: default; }
  button.ghost {
    background: transparent; color: var(--accent); border: 1px solid var(--accent);
    border-radius: 8px; padding: 9px 18px; font-size: .9rem; cursor: pointer;
  }
  .progress { height: 6px; background: var(--line); border-radius: 3px; margin-bottom: 14px; overflow: hidden; }
  .progress > div { height: 100%; background: var(--accent); width: 0; transition: width .25s; }
  .meta { display: flex; justify-content: space-between; color: var(--sub); font-size: .85rem; margin-bottom: 10px; }
  .tag { display: inline-block; background: var(--accent-soft); color: var(--accent);
         border-radius: 6px; padding: 1px 8px; font-size: .78rem; margin-bottom: 8px; }
  .q { font-size: 1.02rem; font-weight: 600; margin: 0 0 14px; white-space: pre-wrap; }
  .opts { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    text-align: left; border: 1px solid var(--line); background: var(--card);
    border-radius: 10px; padding: 11px 14px; font-size: .95rem; cursor: pointer;
    color: var(--ink); width: 100%;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); }
  .opt:disabled { cursor: default; }
  .opt.correct { background: var(--ok-soft); border-color: var(--ok); }
  .opt.wrong { background: var(--bad-soft); border-color: var(--bad); }
  .opt.dim { opacity: .6; }
  .exp {
    margin-top: 14px; border-left: 3px solid var(--accent); background: var(--accent-soft);
    border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: .9rem; display: none;
  }
  .exp.show { display: block; }
  .exp .verdict { font-weight: 700; }
  .exp .verdict.ok { color: var(--ok); }
  .exp .verdict.bad { color: var(--bad); }
  .foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .score { font-size: 2rem; font-weight: 700; margin: 4px 0; }
  .review-item { border-top: 1px solid var(--line); padding: 12px 0; font-size: .9rem; }
  .review-item .rq { font-weight: 600; }
  .review-item .ra { color: var(--ok); }
  .review-item .rw { color: var(--bad); }
  .hidden { display: none; }
  .count-note { color: var(--sub); font-size: .85rem; margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📖 용어 사전 복습 퀴즈</h1>
    <p>RAPV-Assistant <code>description/dictionary.md</code> 기반 · 문제를 풀면 바로 정답과 해설이 표시된다.</p>
  </header>

  <!-- 시작 화면 -->
  <section id="start" class="card">
    <strong>범위 선택</strong>
    <div class="parts" id="partChips"></div>
    <div class="count-note" id="countNote"></div>
    <div class="foot" style="justify-content:flex-start">
      <button class="primary" id="btnStart">시작하기</button>
    </div>
  </section>

  <!-- 문제 화면 -->
  <section id="quiz" class="card hidden">
    <div class="progress"><div id="bar"></div></div>
    <div class="meta"><span id="qNo"></span><span id="scoreNow"></span></div>
    <span class="tag" id="qPart"></span>
    <p class="q" id="qText"></p>
    <div class="opts" id="opts"></div>
    <div class="exp" id="exp"></div>
    <div class="foot">
      <button class="primary" id="btnNext" disabled>다음</button>
    </div>
  </section>

  <!-- 결과 화면 -->
  <section id="result" class="card hidden">
    <strong>결과</strong>
    <div class="score" id="finalScore"></div>
    <p id="finalMsg" style="color:var(--sub); margin:0 0 10px"></p>
    <div class="foot" style="justify-content:flex-start">
      <button class="primary" id="btnRetryWrong">틀린 문제만 다시 풀기</button>
      <button class="ghost" id="btnRestart">처음부터 다시</button>
    </div>
    <div id="reviewList" style="margin-top:18px"></div>
  </section>
</div>

<script>
"use strict";

/* ------------------------------------------------------------------ *
 * 문제 은행 — dictionary.md 의 0부~5부 구성을 그대로 따른다.
 * { p: 파트번호, q: 질문, o: 보기 4개, a: 정답 인덱스, e: 해설 }
 * ------------------------------------------------------------------ */
const PART_NAMES = ["0부 · 소프트웨어 기초", "1부 · 제약 도메인", "2부 · 검색·RAG",
                    "3부 · LLM·에이전트·MCP", "4부 · 신뢰성·검증", "5부 · 운영·측정"];

const BANK = [
// ───────── 0부 — 소프트웨어·데이터 기초 ─────────
{p:0,q:"API 에 대한 설명으로 가장 알맞은 것은?",
 o:["사람이 시스템을 쓰기 위한 화면(UI)이다",
    "프로그램이 다른 프로그램의 기능을 사용할 수 있도록 약속해 둔 호출 규격이다",
    "데이터베이스에 데이터를 저장하는 형식이다",
    "서버를 실행하는 운영체제 명령어다"],
 a:1,e:"사람이 화면(UI)으로 시스템을 쓰듯, 프로그램은 API 로 시스템을 쓴다. 이 데모의 /chat·/health 가 API 엔드포인트다."},
{p:0,q:"이 데모에서 질문을 제출하는 /chat 엔드포인트가 쓰는 HTTP 메서드는?",
 o:["GET — 상태를 조회하므로","POST — 데이터를 제출하므로","PUT — 자원을 교체하므로","DELETE — 이전 대화를 지우므로"],
 a:1,e:"질문을 '제출'하므로 POST 를 쓴다. 상태 '조회'인 /health 는 GET 이다."},
{p:0,q:"JSON 에 대한 설명으로 틀린 것은?",
 o:["키-값 쌍과 배열로 구조화된 데이터를 표현한다",
    "사람이 읽을 수 있으면서 기계가 파싱하기 쉽다",
    "이 데모의 감사 로그·도구 출력이 JSON 형식이다",
    "바이너리 형식이라 텍스트 편집기로 열 수 없다"],
 a:3,e:"JSON 은 텍스트 형식이다. 검증기의 날짜 역할 대조는 도구 출력 JSON 의 키 이름(deadline_date)을 역할 라벨로 활용한다."},
{p:0,q:"'직렬화(serialization)'란 무엇인가?",
 o:["여러 요청을 순서대로 처리하는 것",
    "메모리 안의 객체를 저장·전송 가능한 문자열/바이트로 바꾸는 것",
    "데이터를 암호화하는 것",
    "코드를 한 줄씩 실행하는 것"],
 a:1,e:"이 데모의 _stringify() 가 도구 출력 객체를 JSON 문자열로 직렬화해 LLM 되먹임과 검증 신뢰 소스에 쓴다."},
{p:0,q:"Pydantic 이 이 데모에서 하는 역할은?",
 o:["임베딩 벡터를 계산한다",
    "API 입출력의 스키마(필드·타입·필수 여부)를 선언하고 자동 검증한다",
    "LLM 응답을 생성한다",
    "테스트를 실행한다"],
 a:1,e:"ChatRequest/ChatResponse 가 Pydantic 모델이다. message 필드가 없는 요청은 스키마 검증에서 걸려 에이전트에 도달하지 못한다."},
{p:0,q:"환경변수를 쓰는 이유로 알맞지 않은 것은?",
 o:["코드를 고치지 않고 실행 환경마다 동작을 바꿀 수 있다",
    "API 키 같은 비밀 값을 소스 코드 밖에 둘 수 있다",
    "이 데모의 하이퍼파라미터를 밖에서 제어할 수 있다",
    "프로그램의 실행 속도가 빨라진다"],
 a:3,e:"환경변수는 설정 주입 수단이지 성능 최적화 수단이 아니다. ANTHROPIC_API_KEY 존재 여부 하나가 LLM/오프라인 모드를 가른다."},
{p:0,q:"frontmatter 란 무엇인가?",
 o:["마크다운 문서 맨 위에 --- 로 감싸 넣는 YAML 메타데이터 블록",
    "HTML 문서의 헤더 태그",
    "파이썬 함수의 첫 번째 주석",
    "JSON 파일의 첫 번째 키"],
 a:0,e:"이 데모의 규제문서 frontmatter(doc_id·version·effective_date·status)가 출처 표시와 버전 인지 검색의 뿌리다."},
{p:0,q:"'결정론적(deterministic)'의 의미로 알맞은 것은?",
 o:["실행할 때마다 더 좋은 결과가 나온다",
    "같은 입력에 항상 같은 출력이 나온다",
    "사람이 개입해야 결과가 확정된다",
    "확률적으로 가장 그럴듯한 답을 고른다"],
 a:1,e:"결정론이라야 결과를 재현·감사할 수 있다. 보고기한 계산을 LLM(확률)이 아니라 규칙(결정론)에 맡긴 근본 이유다."},
{p:0,q:"EmbeddingProvider 같은 '인터페이스(Protocol)'의 가치는?",
 o:["코드 실행 속도를 높인다",
    "약속(메서드 시그니처)만 정의하고 구현은 갈아 끼울 수 있게 한다",
    "메모리 사용량을 줄인다",
    "테스트를 생략할 수 있게 한다"],
 a:1,e:"인터페이스 하나에 TF-IDF·해싱·Voyage 세 구현이 꽂힌다 — '임베더 교체 가능'이 말이 아니라 동작하는 코드로 존재하는 방식이다."},
{p:0,q:"이 데모가 무거운 작업(파싱·청킹·임베딩)을 부팅 시 1회만 하는 이유는?",
 o:["부팅 로그를 예쁘게 만들기 위해",
    "요청 경로에는 가벼운 검색만 남겨 질의 지연을 낮추기 위해",
    "메모리를 아끼기 위해",
    "테스트를 빠르게 돌리기 위해"],
 a:1,e:"인덱싱 시간과 질의 시간의 분리다. 그 결과 전체 검색 지연이 ~0.9ms 수준으로 유지된다."},
{p:0,q:"리랭커가 청크 토큰·제목 가중치를 인덱싱 시점에 미리 계산해 두는 것은 어떤 기법인가?",
 o:["캐시 — 바뀌지 않는 값의 재계산을 피한다","파싱 — 텍스트를 구조화한다",
    "직렬화 — 객체를 문자열로 바꾼다","마스킹 — 값을 가린다"],
 a:0,e:"질의마다 재토크나이징하면 지연이 몇 배로 늘기 때문에 캐시한다."},
{p:0,q:"종료 코드(exit code)에 대한 설명으로 맞는 것은?",
 o:["0이 실패, 1이 성공을 뜻한다",
    "관례상 0이 성공이며, preflight 가 exit 1 을 내면 run.sh 는 서버를 띄우지 않는다",
    "종료 코드는 사람만 읽을 수 있다",
    "CI 는 종료 코드를 무시한다"],
 a:1,e:"'기동 차단'의 실체가 exit 1 이다. 반대로 평가 스크립트는 측정만 하고 exit 0 이므로 강제는 pytest 가드가 따로 맡는다."},
{p:0,q:"'회귀 테스트'의 정의로 알맞은 것은?",
 o:["무작위 입력을 대량으로 넣어 보는 테스트",
    "발견된 결함·반례를 테스트로 고정해 재발을 막는 테스트",
    "함수 하나를 고립시켜 검사하는 테스트",
    "배포 직후 기본 동작만 확인하는 테스트"],
 a:1,e:"이 프로젝트의 규칙은 '리뷰에서 나온 반례는 반드시 회귀 테스트가 된다'이다. 무작위 입력은 fuzz, 고립 검사는 단위, 기본 동작 확인은 스모크 테스트다."},
{p:0,q:"하이퍼파라미터에 대한 이 프로젝트의 원칙은?",
 o:["기본값은 직감으로 정하고 문제가 생기면 바꾼다",
    "값의 근거를 스윕·ablation 재현 스크립트로 남긴다",
    "한 번 정한 값은 절대 바꾸지 않는다",
    "가능한 한 많은 파라미터를 만든다"],
 a:1,e:"CHUNK_SIZE=500, α=0.5 같은 기본값의 근거는 eval/sweep.py 로 재현된다 — '감이 아니라 수치'가 원칙이다."},

// ───────── 1부 — 제약 도메인 ─────────
{p:1,q:"RA(Regulatory Affairs) 담당자의 업무로 가장 알맞은 것은?",
 o:["의약품의 임상시험을 직접 수행한다",
    "의약품 허가·변경·표시 등 규제 인허가 업무와 규정 해석을 담당한다",
    "공장에서 의약품을 제조한다",
    "약국에서 의약품을 판매한다"],
 a:1,e:"'이 변경은 허가 대상인가 신고 대상인가', '심사 기간은 며칠인가'에 규정 문서를 근거로 답하는 것이 RA 의 일상이다."},
{p:1,q:"PV(약물감시)가 필요한 근본 이유는?",
 o:["허가 심사가 형식적이기 때문",
    "허가는 제한된 임상 데이터로 나므로, 대규모 실사용에서 드러나는 위험은 시판 후에 관리해야 하기 때문",
    "제약회사의 매출을 늘리기 위해",
    "규제당국의 인력이 부족하기 때문"],
 a:1,e:"수백~수천 명 임상으로는 안 보이던 위험이 수십만 명 사용에서 드러난다 — 그것을 잡는 체계가 PV 다."},
{p:1,q:"이상사례(AE)와 이상약물반응(ADR)의 관계로 맞는 것은?",
 o:["같은 말이다",
    "AE 는 인과관계와 무관하게 수집되는 모든 사례이고, ADR 은 인과성이 평가된 것이다",
    "ADR 이 AE 보다 넓은 개념이다",
    "AE 는 중대한 것, ADR 은 비중대한 것이다"],
 a:1,e:"수집 단계에서는 넓게(AE), 평가 후에 좁게(ADR) — 이 구분이 PV 데이터 흐름의 뼈대다."},
{p:1,q:"다음 중 중대성(Seriousness) 기준의 닫힌 목록에 해당하지 않는 것은?",
 o:["사망","입원 또는 입원기간 연장","증상이 매우 고통스러움(심한 두통 등)","선천적 기형"],
 a:2,e:"중대성(seriousness)은 심각도(severity)와 다르다 — 아무리 고통스러워도 목록(사망·생명위협·입원·장애·기형·의학적 중요)에 없으면 non-serious 다."},
{p:1,q:"이 데모의 트리아지 규칙에서 '사망·생명위협' 케이스의 보고 기한은?",
 o:["인지일로부터 15일 이내","인지일로부터 30일 이내","지체 없이(D+0)","정기보고(PSUR)에 포함"],
 a:2,e:"사망·생명위협 → 지체 없이, 그 외 중대 → 인지일+15일, 비중대 → PSUR — 세 갈래 분류다."},
{p:1,q:"인지일(awareness date)이 컴플라이언스의 핵심 값인 이유는?",
 o:["환자가 증상을 처음 느낀 날이라서",
    "신속보고 기한의 기산점(카운트 시작일)이라서 — 하루 틀리면 기한도 하루 틀린다",
    "의사가 진단을 확정한 날이라서",
    "보고서를 제출한 날이라서"],
 a:1,e:"인지일은 '회사가 알게 된 날'이다. 그래서 이 데모는 형식 오류·미래 날짜(오타 개연성)를 모두 시끄러운 caveat 로 알린다."},
{p:1,q:"ICH E2D 최소보고요건 4요소가 아닌 것은?",
 o:["식별 가능한 환자","식별 가능한 보고자","의심 의약품","확정된 인과성 평가 결과"],
 a:3,e:"4요소는 환자·보고자·의심약·이상사례다. 인과성은 보고 후에도 평가·갱신되는 항목이지 보고의 전제 조건이 아니다."},
{p:1,q:"WHO-UMC 인과성 평가에서 'dechallenge'의 의미는?",
 o:["의심약을 다시 투여했더니 증상이 재발한 것",
    "의심약을 중단했더니 증상이 호전된 것",
    "병용약이 원인일 가능성",
    "증상 발생의 시간적 선후관계"],
 a:1,e:"중단 후 호전이 dechallenge, 재투여 후 재발이 rechallenge 다. rechallenge 가 인과성의 가장 강한 증거다."},
{p:1,q:"이 데모가 중대성 판정은 '확정'으로, 인과성 평가는 '제안+질문'으로 출력하는 이유는?",
 o:["인과성 계산이 더 오래 걸려서",
    "중대성은 닫힌 목록과의 '대조'지만 인과성은 임상 정보의 종합 '판단'이라서",
    "인과성은 법적 책임이 없어서",
    "중대성 판정이 더 중요해서"],
 a:1,e:"업무의 인식론적 성격에 따라 자동화의 확신 수준을 조절한 것 — 이 데모의 대표 설계 포인트다."},
{p:1,q:"MedDRA 계층에서 '숨이 차다' 같은 구어 변형 표현이 매핑되는 곳은?",
 o:["SOC (기관계 대분류)","PT (대표 표준 용어)","LLT (최하위 용어)","ICSR"],
 a:2,e:"LLT(구어·변형)가 PT(호흡곤란/Dyspnoea)로 묶이고, PT 는 SOC(호흡기 장애)로 분류된다."},
{p:1,q:"용어 코딩이 흔들리면 무너지는 것은?",
 o:["서버 부팅 속도",
    "시그널 탐지 — 같은 이상사례가 다른 이름으로 흩어져 '약-반응' 조합의 집계가 왜곡된다",
    "PII 마스킹","웹 UI 렌더링"],
 a:1,e:"그래서 이 데모의 확정 코딩은 정밀도 무관용(오탐 0)이고, 검수 안 된 매핑은 '후보'로만 낸다."},
{p:1,q:"as_of(시점 조회)의 올바른 의미론은?",
 o:["현행 문서 중 그 날짜 이전에 만들어진 것만 반환한다",
    "'그 시점의 현행'을 반환한다 — 폐지본이라도 [시행일, 후속본 시행일) 구간이면 포함한다",
    "폐지본만 반환한다",
    "그 날짜 이후에 개정된 문서만 반환한다"],
 a:1,e:"'폐지본 기본 제외'를 as_of 에 그대로 겹치면 개정된 규정의 과거 조회에서 신·구판이 모두 걸러져 0건이 된다 — 실제로 발견·수정된 필터 조합 결함이다."},
{p:1,q:"\"120 근무일\"을 \"120일\"로 바꿔 적는 것이 오류인 이유는?",
 o:["단위 표기가 길어져서",
    "근무일은 주말·공휴일을 제외하므로 실제 달력상 기한이 달라진다",
    "규정에는 숫자를 쓸 수 없어서",
    "오류가 아니다 — 같은 뜻이다"],
 a:1,e:"근무일(working day)과 역일(calendar day)은 다른 단위다. 검증기가 '근무일'과 '일'을 별개 단위로 대조하는 이유다."},

// ───────── 2부 — 검색·RAG ─────────
{p:2,q:"한국어 검색에서 어절 토큰화만으로 부족한 이유는?",
 o:["한국어에는 띄어쓰기가 없어서",
    "조사('허가를/허가는')와 띄어쓰기 변형 때문에 같은 말이 다른 토큰이 되기 쉬워서",
    "한국어 단어가 너무 길어서",
    "형태소 분석기가 무료가 아니어서"],
 a:1,e:"그래서 이 데모는 어절 + CJK 문자 bi-gram 을 함께 생성한다 — '감기약'과 '감기'가 bi-gram 으로 이어진다."},
{p:2,q:"TF-IDF 에서 IDF 의 역할은?",
 o:["문서가 길수록 점수를 높인다",
    "전체 문서에 흔한 단어(조사·일반어)의 힘을 빼고 희귀한 단어를 부각한다",
    "단어의 순서를 반영한다",
    "동의어를 자동으로 연결한다"],
 a:1,e:"TF(이 문서에서의 빈도) × IDF(전체에서의 희귀함)로 중요도를 매긴다. 어휘가 겹쳐야만 유사해지는 희소 벡터의 재료다."},
{p:2,q:"BM25 가 TF-IDF 에 더하는 두 가지 보정은?",
 o:["동의어 확장과 오타 교정","TF 포화(빈도의 한계효용 감소)와 문서 길이 보정",
    "번역과 요약","벡터화와 리랭킹"],
 a:1,e:"같은 단어 100번이 10번보다 '조금만' 더 좋게(포화), 긴 문서의 우연한 이점은 평균 길이 대비로 상쇄(길이 보정)한다."},
{p:2,q:"희소(sparse) 벡터와 밀집(dense) 벡터의 차이로 맞는 것은?",
 o:["희소는 어휘가 겹쳐야 유사해지고, 밀집은 어휘가 달라도 의미가 가까우면 유사해진다",
    "밀집 벡터는 항상 희소 벡터보다 검색이 정확하다",
    "희소 벡터는 신경망으로만 만들 수 있다",
    "밀집 벡터는 의존성이 없다"],
 a:0,e:"'계속 제출해야 하나?'와 '정기 보고(PSUR)' 사이의 의미 간극은 희소 벡터가 못 메운다 — 이 데모가 남긴 정직한 갭이자 밀집 임베딩 교체 지점이다."},
{p:2,q:"코사인 유사도의 핵심 특징은?",
 o:["벡터의 길이(문서 길이)의 영향을 지우고 방향(내용 구성비)만 비교한다",
    "긴 문서일수록 점수가 높아진다",
    "음수가 나올 수 없다",
    "정수만 반환한다"],
 a:0,e:"길이를 지우므로 긴 문서와 짧은 질의도 공정하게 비교된다."},
{p:2,q:"청킹에서 overlap(겹침)을 두는 이유는?",
 o:["청크 수를 늘려 검색을 느리게 하려고",
    "청크 경계에 걸린 문장의 정보가 앞뒤 어느 청크에서도 온전하지 않게 되는 것을 막으려고",
    "중복 제거를 쉽게 하려고",
    "메모리를 아끼려고"],
 a:1,e:"이 데모는 헤딩 구조 분할 + 500자/80자 overlap 슬라이딩 윈도우의 두 겹 청킹이다."},
{p:2,q:"각 청크 앞에 [문서제목 > 섹션제목] 을 붙이는 기법의 목적은?",
 o:["사람이 읽기 좋게 하려고",
    "청크가 문서에서 고립되어도 어느 맥락인지를 검색 신호에 반영하려고 (Contextual Retrieval 경량판)",
    "청크 크기를 정확히 500자로 맞추려고",
    "마크다운 문법을 지키려고"],
 a:1,e:"청크 본문에 '보고 기한'만 있어도 접두 [시판 후 안전관리 > 신속보고] 가 문서 정합 신호를 준다."},
{p:2,q:"RAG 의 장점이 아닌 것은?",
 o:["근거가 실재하므로 출처를 붙일 수 있다",
    "근거가 없으면 '모른다'고 답할 수 있는 토대가 된다",
    "모델 재학습 없이 문서 교체만으로 지식이 갱신된다",
    "LLM 의 환각이 원천적으로 불가능해진다"],
 a:3,e:"RAG 는 환각을 억제하는 토대이지 원천 차단이 아니다 — 그래서 이 데모는 abstention 과 사후 검증 게이트를 따로 둔다."},
{p:2,q:"질의확장 사전을 '단방향(구어→정식 용어), 원 질의에 append'로만 운용하는 이유는?",
 o:["코드가 짧아져서",
    "양방향·연쇄 확장은 주제 표류(원 의도와 다른 문서를 끌어옴)를 만들기 쉬워서",
    "사전 크기를 늘리기 위해서",
    "검색 속도를 높이기 위해서"],
 a:1,e:"실제로 'DMF' 확장이 주제 표류를 일으켜 사전에서 뺀 기록이 남아 있다 — 확신 없는 항목은 넣지 않는다."},
{p:2,q:"하이브리드 검색에서 min-max 정규화가 필요한 이유는?",
 o:["코사인(0~1)과 BM25(상한 없음)의 스케일이 달라 그대로 더하면 한쪽이 지배하므로",
    "점수를 정수로 만들기 위해",
    "검색 결과를 알파벳순으로 정렬하기 위해",
    "벡터 차원을 줄이기 위해"],
 a:0,e:"함정 하나 — 정규화는 버전 필터를 통과한 후보군 '안에서' 해야 한다. 전체 기준이면 필터로 빠진 문서가 스케일을 왜곡한다."},
{p:2,q:"'하드네거티브'란 무엇이며 이 데모는 왜 일부러 넣었나?",
 o:["아주 어려운 질문 — 난이도 과시용",
    "어휘가 겹쳐 그럴듯하게 틀린 오답 문서 — 쉬운 평가셋에선 모든 방식이 만점이라 최적화 효과가 안 보이므로 평가의 변별력을 만들기 위해",
    "일부러 심은 오타 문서 — 파서 테스트용",
    "빈 문서 — 예외 처리 테스트용"],
 a:1,e:"'평가 설계가 곧 실력' — HardNegHit@1 0.786→1.000 이 RAG 최적화의 핵심 근거 수치가 된다."},
{p:2,q:"1차 검색(Bi-Encoder 감각)과 2차 리랭킹(Cross-Encoder 감각)의 역할 분리는?",
 o:["1차는 정밀도, 2차는 재현율을 맡는다","1차는 넓게 회수(재현율), 2차는 좁게 선별(정밀도)한다",
    "둘 다 재현율을 맡는다","1차는 한국어, 2차는 영어를 맡는다"],
 a:1,e:"top_k=8 로 넓게 회수한 뒤 rerank_n=3 으로 좁힌다. 순수 재정렬은 쉬운 질의를 떨어뜨려 1차 점수를 10% 블렌딩(rerank_weight=0.9)한다."},
{p:2,q:"섹션 타입 prior 에서 '질의 의도 게이트'가 하는 일은?",
 o:["질의가 비교('차이가 뭐야?')나 정의를 물으면 대조·서두 섹션 페널티를 끈다",
    "질의 길이가 짧으면 검색을 거부한다",
    "질의를 영어로 번역한다",
    "모든 섹션에 같은 점수를 준다"],
 a:0,e:"대조 섹션이 '정답'인 질문도 있으므로 — 게이트가 없으면 prior 가 무차별 삭제가 된다. 반대 방향 문항 2개가 평가셋에 들어 있다."},
{p:2,q:"MRR(Mean Reciprocal Rank)의 계산 방식은?",
 o:["정답이 1위인 문항의 비율","정답이 처음 등장한 순위의 역수(1위=1, 2위=0.5)의 평균",
    "정답 문서의 개수 평균","검색 지연의 평균"],
 a:1,e:"1위를 놓쳐도 상위권이면 부분 점수를 주는 지표다. 정답 1위 비율은 Hit@1 이다."},
{p:2,q:"ContextRecall 이 '생성 품질의 상한'이라 불리는 이유는?",
 o:["생성 모델의 온도를 제한하므로",
    "검색이 정답의 '재료'를 못 주면 생성이 아무리 좋아도 정답이 불가능하므로",
    "토큰 수를 제한하므로","출처 개수를 제한하므로"],
 a:1,e:"최종 근거 묶음이 정답을 말할 재료를 담고 있는 비율이다."},
{p:2,q:"소표본 평가에서 1.000 에 Wilson 95% 신뢰구간 [0.893, 1.000] 을 병기하는 이유는?",
 o:["숫자를 많아 보이게 하려고",
    "1.000 은 '완벽'이 아니라 '이 표본에서 실패 관측 0'일 뿐임을 명시하고 하한을 보수적 추정으로 읽기 위해",
    "국제 표준이 요구해서","신뢰구간이 없으면 코드가 컴파일되지 않아서"],
 a:1,e:"규율 하나 더 — 두 설정의 구간이 크게 겹치면 '개선'이 아니라 '구분 불가'로 읽는다."},

// ───────── 3부 — LLM·에이전트·MCP ─────────
{p:3,q:"LLM 의 '환각(hallucination)'이란?",
 o:["모델이 응답을 거부하는 것",
    "그럴듯하지만 사실이 아닌 내용을 만들어내는 것",
    "응답이 너무 짧은 것",

{p:3,q:"Function Calling(tool use)에서 모델이 도구를 고를 때 참고하는 것은?",

 a:1,e:"모델은 코드를 보지 못한다 — 그래서 'docstring 이 곧 LLM 용 사용설명서'이며 도구 설명 품질이 도구 선택 품질을 정한다."},
{p:3,q:"이 데모 에이전트 루프의 안전장치가 아닌 것은?",
 o:["스텝 상한 6회 (무한루프 방지)",
    "도구 실패를 is_error 로 되먹여 자가 복구",
    "시스템 프롬프트의 근거 강제",
    "실패한 도구를 영구히 비활성화"],
 a:3,e:"실패는 크래시 대신 tool_result(is_error=True)로 모델에 되돌려, 모델이 다른 도구·인자로 재시도하게 한다."},
{p:3,q:"도구를 MCP 서버로 분리했을 때의 확장성 효과는?",
 o:["N개 모델 × M개 도구의 통합이 N+M 으로 줄고, 같은 도구 서버를 여러 클라이언트가 재사용한다",
    "도구 실행 속도가 2배가 된다",
    "도구 코드를 공개하지 않아도 된다",
    "LLM 없이도 도구가 스스로 동작한다"],
 a:0,e:"Claude Desktop·Cursor·사내 에이전트가 같은 도구 서버를 재사용한다 — 도구를 에이전트 코드에 함수로 박았다면 불가능한 확장성이다."},
{p:3,q:"MCP 3대 primitive 중 'Prompts'(pv_case_intake)의 역할은?",
 o:["도구 실행 속도를 높인다",
    "케이스 처리 SOP(표준 절차)를 서버가 배포해, 어느 클라이언트가 붙어도 같은 절차로 일하게 한다",
    "문서 원문을 열람하게 한다",
    "PII 를 마스킹한다"],
 a:1,e:"도구만 배포하면 '올바른 사용 순서'는 클라이언트마다 제각각이 된다. 원문 열람은 Resource(regulation://{doc_id})의 몫이다."},
{p:3,q:"stdio 단독 사용(Claude Desktop 직결)이 PII 설계에 주는 함의는?",
 o:["stdio 는 자동으로 암호화되므로 마스킹이 불필요하다",
    "도구 인자가 에이전트 입구를 거치지 않고 직접 들어오므로, 도구 계층에서도 마스킹해야 한다(심층방어)",
    "stdio 에서는 PII 입력이 불가능하다",
    "인메모리 방식보다 항상 느리다"],
 a:1,e:"'입구에서 막으면 전부 안전'이라는 명제의 숨은 전제(모든 입력이 입구를 지난다)가 stdio 직결에서 깨진다 — 그래서 마스킹은 2겹이다."},
{p:3,q:"graceful degradation 의 이 데모 구현은?",
 o:["API 키가 없으면 서버가 종료된다",
    "API 키가 없으면 규칙 라우터가 같은 MCP 도구를 호출하고 근거 발췌로 답하는 오프라인 모드로 전환된다",
    "API 키가 없으면 영어로만 답한다",
    "API 키가 없으면 캐시된 답변만 반환한다"],
 a:1,e:"두 모드는 동일한 도구·인터페이스·검증 게이트를 쓴다 — 차이는 '누가 도구를 고르는가'뿐이다."},
{p:3,q:"오프라인 라우터가 체크리스트 카테고리를 '확신 없으면 추측하지 않는' 이유는?",
 o:["추측 계산이 느려서",
    "항상 유효한 인자를 추측해 넣으면 도구의 에러 계약(error+available)이 발동할 기회를 잃기 때문",
    "카테고리가 하나뿐이라서",
    "LLM 모드에서만 체크리스트를 지원해서"],
 a:1,e:"안전장치를 만든 층 '아래'에서 그 장치를 우회하지 않는 것까지가 계약의 완성이다."},
{p:3,q:"멀티턴에서 from_question 완화 라벨의 창을 '직전 턴까지'로 제한하는 이유는?",
 o:["메모리를 아끼기 위해",
    "대화 전체를 누적하면 오래전 무관한 수치가 이후 모든 환각을 '전제'로 완화 라벨링하기 때문",
    "직전 턴 외에는 저장되지 않아서",
    "LLM 이 두 턴까지만 기억해서"],
 a:1,e:"완화 라벨의 면적은 실제 전제 이월이 일어나는 창으로 최소화한다."},
{p:3,q:"LLM 모드 테스트에서 anthropic 클라이언트'만' 스텁으로 바꾸는 이유는?",
 o:["나머지는 스텁으로 만들 수 없어서",
    "검증 대상이 모델의 지능이 아니라 그 주변의 배선(신뢰 소스 수집·허용 집합·에러 계약)이므로, 스텁 경계를 최소로 잡는다",
    "anthropic 라이브러리가 무료가 아니라서",
    "테스트 속도를 늦추기 위해"],
 a:1,e:"MCP·RAG·검증 게이트는 실물을 태워 '형식 오류 as_of 가 허용 집합을 못 여는' 계약을 실행으로 고정한다."},

// ───────── 4부 — 신뢰성·검증 ─────────
{p:4,q:"'추적성(traceability)'이 규제 도메인에서 중요한 이유는?",
 o:["답변 속도를 높여서",
    "담당자가 확정 전에 '어느 문서의 어느 부분에서 온 답인가'를 원문과 대조해야 하므로",
    "저장 공간을 아껴서","UI 를 예쁘게 만들어서"],
 a:1,e:"'답이 맞는가'만큼 '왜 이 답인가'가 중요하다 — 모든 답변에 출처(문서·섹션·버전)가 붙는 이유다."},
{p:4,q:"abstention 판정이 OR 가 아니라 AND 조건(두 신호 모두 미달 시에만 회피)인 이유는?",
 o:["코드가 짧아져서",
    "구어체 정상 질문은 점수가 낮아도 커버리지가 남는데, OR 면 이런 질문까지 회피하는 과회피가 생겨서",
    "AND 가 항상 더 많은 질문을 회피하므로",
    "OR 조건은 파이썬이 지원하지 않아서"],
 a:1,e:"회피 설계는 환각(못 막음)과 과회피(정상 질문 거부) 사이의 균형 문제다."},
{p:4,q:"검증 게이트의 '신뢰 소스' 정의로 올바른 것은?",
 o:["검색 근거 ∪ 결정론적 도구 출력 − 입력 에코(query·as_of) − 에러 계약 응답",
    "검색 근거만","사용자 입력 전체","LLM 이 생성한 모든 텍스트"],
 a:0,e:"도구가 '계산한' 값(인지일+15일=마감일)은 포함해야 오탐이 없고, 사용자 입력 에코는 빼야 '전제의 승격'이 없다."},
{p:4,q:"'전제의 승격'이란 어떤 구멍인가?",
 o:["시스템 프롬프트가 사용자 프롬프트를 덮어쓰는 것",
    "도구 출력에 에코된 사용자 입력이 신뢰 소스가 되어, 사용자가 틀린 수치를 전제로 물었을 때 모델이 맞장구쳐도 검증을 통과하는 것",
    "관리자 권한이 일반 사용자에게 넘어가는 것",
    "낮은 점수의 문서가 1위로 올라오는 것"],
 a:1,e:"'보고 기한 30일 맞지?'라는 질문의 30일이 에코로 신뢰 소스에 들어가면, 맞장구 답변이 검증을 통과한다."},
{p:4,q:"오타 난 필터에 빈 목록 대신 {\"error\", \"available\": [...]} 를 돌려주는 이유는?",
 o:["빈 목록은 메모리를 낭비해서",
    "빈 결과는 '임박한 마감이 없습니다'라는 자신 있는 오답으로 포장되고, available 목록은 에이전트의 자가 정정 재료가 되므로",
    "에러가 로그에 더 잘 남아서","JSON 표준이 빈 배열을 금지해서"],
 a:1,e:"조용한 빈 결과 금지 — 사용자는 틀렸다는 신호를 받을 길이 없다. LLM 은 is_error 되먹임의 available 을 보고 재시도한다."},
{p:4,q:"에러 계약 응답을 신뢰 소스에서 '통째로' 제외하는 이유는?",
 o:["에러 응답은 너무 길어서",
    "에러 문구에 사용자 입력이 에코되므로(\"as_of '2024/06/01' 가 …\") 잘못된 입력 값이 '근거'로 승격되기 때문",
    "에러 응답은 JSON 이 아니라서",
    "검증 속도를 높이기 위해"],
 a:1,e:"query·as_of 키만 걷어내는 필드 단위 접근으로는 못 막는다 — 값이 error 문자열 '안에' 들어 있기 때문이다. 수정이 새 구멍을 연 사례이기도 하다."},
{p:4,q:"방향 한정어 검증이 잡는 왜곡의 형태는?",
 o:["수치 자체가 근거에 없는 것",
    "수치는 근거에 있는데 '15일 이내'가 '15일 이후'로 뒤집힌 것",
    "출처가 누락된 것","답변이 너무 긴 것"],
 a:1,e:"수치 존재 대조만으로는 통과하는 가장 교묘한 왜곡이다. 닫힌 어휘(이내·이하·까지/이상·이후·초과)라 기계 검증이 가능하다."},
{p:4,q:"날짜 역할 스왑(인지일↔마감일)이 '존재 대조를 정의상 통과'하는 이유는?",
 o:["날짜는 검증 대상이 아니라서",
    "두 날짜 모두 신뢰 소스에 실존하므로 '존재하는가' 검사로는 구분할 수 없어서",
    "날짜 형식이 다양해서","역할 스왑은 실제로 일어나지 않아서"],
 a:1,e:"그래서 도구의 역할 라벨(deadline_date·awareness_date)과 답변의 역할 키워드에 직접 붙은 날짜를 따로 대조하는 별도 축이 필요하다."},
{p:4,q:"'표기 변형'과 '환산'을 가르는 판정 질문은?",
 o:["표기가 한국어인가 영어인가",
    "이 대조를 통과시키면 근거에 없는 '새 값'이 생기는가 — 생기면 환산(금지), 안 생기면 표기 변형(정규화)",
    "숫자가 커지는가 작아지는가","날짜인가 기간인가"],
 a:1,e:"보름=15일, '7월 25일'=근거 날짜의 월-일 성분은 표기 변형이고, '15일→약 2주'·'120 근무일→120일'은 새 값을 만드는 환산이다."},
{p:4,q:"케이스 서술에서만 지지되는 클레임에 from_case '라벨'을 붙이는 3택(차단·침묵·라벨)의 근거는?",
 o:["라벨이 구현하기 가장 쉬워서",
    "차단하면 정당한 재서술마다 오탐이고, 침묵하면 케이스 수치가 규정 클레임의 근거로 승격되는 것이 은폐되며, 기계는 둘을 구분할 수 없으므로 사람이 가리게 라벨로 노출한다",
    "라벨은 로그 용량이 작아서","규제 기관이 라벨을 요구해서"],
 a:1,e:"'케이스는 사실'이 '규정 클레임의 근거'로 건너뛰는 것이 논리적 비약 — 그 지점을 차단도 침묵도 아닌 가시화로 다룬다."},
{p:4,q:"방향·역할 충돌의 판정 기준을 strict 계층(규정·도구)으로만 잡는 이유는?",
 o:["케이스 서술은 항상 거짓이라서",
    "케이스까지 합산해 판정하면 케이스의 '15일 이후 증상'이 규정 '15일 이내'의 방향 경고를 조용히 무력화하기 때문",
    "strict 계층이 계산이 빨라서",
    "케이스 서술에는 날짜가 없어서"],
 a:1,e:"계층·라벨 같은 구조적 결정은 모든 축에 대칭으로 적용됐는지 감사해야 한다 — 존재 축에만 2계층이 있던 비일관성이 실제 발견 사례다."},
{p:4,q:"PII 마스킹이 값은 지우되 존재 신호([이름]님, \"45세 남성\")를 남기는 이유는?",
 o:["마스킹 코드가 단순해져서",
    "최소보고요건의 '식별 가능한 환자' 판정과 양립시키기 위해 — 요건의 본질은 값이 아니라 존재다",
    "존재 신호는 개인정보가 아니라서 법적으로 무의미해서",
    "UI 에 표시할 내용이 필요해서"],
 a:1,e:"외부 API 경계에서는 값을 감추고, 요건 판정은 신호로 — 두 요구를 양립시킨 설계다."},
{p:4,q:"정규식 \\b 가 한국어 텍스트에서 위험한 이유는?",
 o:["한글은 유니코드라서 정규식이 처리하지 못한다",
    "파이썬 정규식에서 한글도 \\w 로 취급되어, '…-5678로'처럼 한글이 숫자에 직결되면 경계가 성립하지 않아 매칭 전체가 조용히 실패한다",
    "\\b 는 영어 전용 문법이라 에러가 난다",
    "한글이 있으면 \\b 가 모든 위치에 매칭된다"],
 a:1,e:"검증기 날짜 추출(v4)과 PII 마스킹(v6)이 모두 이 함정으로 수정됐다 — 해법은 숫자 룩어라운드((?<!\\d)…(?!\\d))다."},
{p:4,q:"'대칭적 비검출'이 가장 악질적인 조용한 실패인 이유는?",
 o:["에러 로그가 두 배로 남아서",
    "추출기가 답변·근거 양쪽에서 똑같이 못 잡으면 오탐조차 나지 않아 완전한 무신호가 되고, 테스트 실패로도 드러나지 않아서",
    "두 서버에서 동시에 발생해서",
    "대칭이라 수학적으로 증명이 불가능해서"],
 a:1,e:"한국어 날짜·고유어 수사·\\b 경계·부분 날짜가 전부 이 형태였다 — 추출기 자체를 의심 목록에 올려야만 보인다."},
{p:4,q:"시점 조회에서 시행일을 해석할 수 없는 문서를 fail-closed 로 제외하는 것의 의미는?",
 o:["예외를 던져 검색 전체를 중단한다",
    "확신할 수 없는 문서를 결과에서 빼되(무필터 통과도 크래시도 아님), 데이터 결함 자체는 preflight 가 따로 시끄럽게 보고한다",
    "그 문서를 무조건 1위로 올린다","서버를 재시작한다"],
 a:1,e:"'언제부터 유효한지 모르는 문서'를 특정 시점의 현행으로 제시하지 않는다 — fail-closed 와 시끄러운 실패는 한 쌍으로 설계한다."},
{p:4,q:"오탐(false positive)을 미탐과 같은 등급의 결함으로 세는 이유는?",
 o:["오탐이 미탐보다 항상 많아서",
    "오탐이 쌓이면 경고가 무시되기 시작하고(alert fatigue), 무시되는 순간 특정 축이 아니라 전 축이 한꺼번에 무력화되므로",
    "오탐은 법적 책임이 커서","오탐 수정이 더 쉬워서"],
 a:1,e:"검증 계층은 두 방향(미탐·오탐)으로 죽는다. '2025년'·'7월 25일' 표기의 오탐 제거가 탐지 추가와 같은 등급의 검증 강화로 취급된 이유다."},
{p:4,q:"인지일이 미래 날짜일 때 자동 정정하지 않고 caveat 만 붙이는 이유는?",
 o:["날짜 계산 라이브러리가 미래를 지원하지 않아서",
    "자동 정정은 또 다른 조용한 오류 경로이므로 — 계산은 입력값대로 하되 오타 개연성을 사람에게 알린다",
    "미래 인지일은 항상 정상이라서","caveat 가 로그에 더 잘 남아서"],
 a:1,e:"형식 검사(parse 가능한가)와 값 타당성 검사(도메인에서 말이 되는가)는 다른 층이다 — 한쪽만 있으면 나머지가 사각지대가 된다."},
{p:4,q:"1차 검증 게이트를 LLM judge 가 아니라 결정론 규칙으로 만든 이유는?",
 o:["LLM judge 가 너무 비싸서",
    "검증자가 확률적이면 '검증의 검증'이 다시 필요해지는 순환이 생기고, 결정론이라야 같은 답변에 항상 같은 판정을 내려 그 자체를 평가셋으로 측정할 수 있어서",
    "규칙이 항상 더 많은 오류를 잡아서",
    "LLM judge 는 한국어를 지원하지 않아서"],

/* ------------------------------------------------------------------ *
 * 상태와 로직
 * ------------------------------------------------------------------ */
let selected = new Set([0,1,2,3,4,5]);   // 선택된 파트
let quiz = [];        // 이번 세션 문제 목록
let idx = 0;          // 현재 문제 인덱스
let correct = 0;      // 맞힌 수
let answered = false;
let wrongList = [];   // 틀린 문제(원본 참조)
let record = [];      // {q, pickedText, ok}

const $ = (id) => document.getElementById(id);

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderChips() {
  const box = $("partChips");
  box.innerHTML = "";
  const all = document.createElement("button");
  all.className = "chip" + (selected.size === 6 ? " on" : "");
  all.textContent = "전체";
  all.onclick = () => { selected = new Set([0,1,2,3,4,5]); renderChips(); };
  box.appendChild(all);
  PART_NAMES.forEach((name, i) => {
    const n = BANK.filter(b => b.p === i).length;
    const c = document.createElement("button");
    c.className = "chip" + (selected.has(i) && selected.size !== 6 ? " on" : "");
    c.textContent = `${name} (${n})`;
    c.onclick = () => {
      if (selected.size === 6) selected = new Set([i]);        // 전체 → 단일 선택
      else if (selected.has(i)) { selected.delete(i); if (!selected.size) selected = new Set([0,1,2,3,4,5]); }
      else selected.add(i);
      renderChips();
    };
    box.appendChild(c);
  });
  const n = BANK.filter(b => selected.has(b.p)).length;
  $("countNote").textContent = `선택된 범위의 문제: ${n}문항 (전체 ${BANK.length}문항) · 문제와 보기는 매번 섞인다.`;
}

function startQuiz(list) {
  quiz = shuffle(list).map(item => {
    const order = shuffle(item.o.map((_, i) => i));
    return { ...item, order };
  });
  idx = 0; correct = 0; wrongList = []; record = [];
  $("start").classList.add("hidden");
  $("result").classList.add("hidden");
  $("quiz").classList.remove("hidden");
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const item = quiz[idx];
  $("bar").style.width = `${(idx / quiz.length) * 100}%`;
  $("qNo").textContent = `문제 ${idx + 1} / ${quiz.length}`;
  $("scoreNow").textContent = `맞힌 수 ${correct}`;
  $("qPart").textContent = PART_NAMES[item.p];
  $("qText").textContent = item.q;
  $("exp").className = "exp";
  $("btnNext").disabled = true;
  $("btnNext").textContent = idx === quiz.length - 1 ? "결과 보기" : "다음";

  const box = $("opts");
  box.innerHTML = "";
  item.order.forEach((origIdx) => {
    const b = document.createElement("button");
    b.className = "opt";
    b.textContent = item.o[origIdx];
    b.onclick = () => pick(b, origIdx);
    box.appendChild(b);
  });
}

function pick(btn, origIdx) {
  if (answered) return;
  answered = true;
  const item = quiz[idx];
  const ok = origIdx === item.a;
  if (ok) correct += 1; else wrongList.push(item);
  record.push({ q: item.q, picked: item.o[origIdx], answer: item.o[item.a], ok });

  [...$("opts").children].forEach((el, i) => {
    el.disabled = true;
    const oi = item.order[i];
    if (oi === item.a) el.classList.add("correct");
    else if (el === btn) el.classList.add("wrong");
    else el.classList.add("dim");
  });
  const exp = $("exp");
  exp.innerHTML = `<span class="verdict ${ok ? "ok" : "bad"}">${ok ? "정답이다." : "오답이다."}</span> ${escapeHtml(item.e)}`;
  exp.classList.add("show");
  $("scoreNow").textContent = `맞힌 수 ${correct}`;
  $("btnNext").disabled = false;
}

function showResult() {
  $("quiz").classList.add("hidden");
  $("result").classList.remove("hidden");
  const pct = Math.round((correct / quiz.length) * 100);
  $("finalScore").textContent = `${correct} / ${quiz.length}  (${pct}%)`;
  $("finalMsg").textContent =
    pct === 100 ? "전 문항 정답이다 — 사전의 해당 범위를 충분히 소화했다." :
    pct >= 80  ? "대부분 소화했다 — 아래 오답만 dictionary.md 에서 다시 확인하면 된다." :
    pct >= 50  ? "절반 이상 맞혔다 — 오답 항목을 사전에서 다시 읽고 '틀린 문제만 다시 풀기'를 권한다." :
                 "기초부터 다시 보는 것이 좋다 — dictionary.md 를 0부부터 순서대로 읽은 뒤 재도전하자.";
  $("btnRetryWrong").disabled = wrongList.length === 0;
  $("btnRetryWrong").textContent = wrongList.length
    ? `틀린 문제만 다시 풀기 (${wrongList.length})` : "틀린 문제 없음";

  const list = $("reviewList");
  list.innerHTML = record.length ? "<strong>전체 풀이 기록</strong>" : "";
  record.forEach((r, i) => {
    const div = document.createElement("div");
    div.className = "review-item";
    div.innerHTML = `<div class="rq">${i + 1}. ${escapeHtml(r.q)}</div>` +
      (r.ok
        ? `<div class="ra">✓ ${escapeHtml(r.answer)}</div>`
        : `<div class="rw">✗ 내 답: ${escapeHtml(r.picked)}</div><div class="ra">정답: ${escapeHtml(r.answer)}</div>`);
    list.appendChild(div);
  });
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}

$("btnStart").onclick = () => startQuiz(BANK.filter(b => selected.has(b.p)));
$("btnNext").onclick = () => { idx += 1; idx < quiz.length ? renderQuestion() : showResult(); };
$("btnRetryWrong").onclick = () => { if (wrongList.length) startQuiz(wrongList); };
$("btnRestart").onclick = () => { $("result").classList.add("hidden"); $("start").classList.remove("hidden"); renderChips(); };

renderChips();
</script>
