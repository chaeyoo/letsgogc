<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="1140" viewBox="0 0 1060 1140" font-family="'Noto Sans KR','Segoe UI',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b7089" />
    </marker>
    <marker id="arw" markerWidth="12" markerHeight="12" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7fa8c9" />
    </marker>
    <marker id="arwg" markerWidth="12" markerHeight="12" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#33c3a6" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1060" height="1140" fill="#0f1720"/>

  <!-- Title -->
  <text x="40" y="46" fill="#e6edf3" font-size="26" font-weight="700">🧬 RA-Assistant · 시스템 아키텍처</text>
  <text x="42" y="72" fill="#8aa0b4" font-size="14">제약 규제업무(RA·PV)용 RAG + MCP Agentic 어시스턴트 — 모델과 도구를 MCP로 분리(= Hey.GC 2.0 구조)</text>

  <!-- Layer labels (left rail) -->
  <text x="20" y="150" fill="#4f9dff" font-size="12" font-weight="700" transform="rotate(-90 20 150)">사용자·서빙</text>
  <text x="20" y="380" fill="#4f9dff" font-size="12" font-weight="700" transform="rotate(-90 20 380)">에이전트·LLM</text>
  <text x="20" y="670" fill="#4f9dff" font-size="12" font-weight="700" transform="rotate(-90 20 670)">MCP 도구 계층</text>
  <text x="20" y="930" fill="#4f9dff" font-size="12" font-weight="700" transform="rotate(-90 20 930)">데이터·워크플로</text>

  <!-- Preflight (Day-0 gate) -->
  <rect x="60" y="100" width="290" height="66" rx="12" fill="#16212e" stroke="#5b6f83" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="205" y="126" fill="#e6edf3" font-size="13.5" font-weight="600" text-anchor="middle">🛫 배포 전 점검 (preflight)</text>
  <text x="205" y="147" fill="#8aa0b4" font-size="10.5" text-anchor="middle">데이터·설정·안전장치 자가 테스트 — 실패 시 기동 차단</text>
  <line x1="280" y1="166" x2="410" y2="220" stroke="#5b6f83" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="290" y="196" fill="#8aa0b4" font-size="10.5">기동 전 게이트 (run.sh · CI)</text>

  <!-- 1) User UI -->
  <rect x="410" y="100" width="240" height="66" rx="12" fill="#16212e" stroke="#4f9dff" stroke-width="1.5"/>
  <text x="530" y="130" fill="#e6edf3" font-size="15" font-weight="600" text-anchor="middle">👤 RA·PV 담당자</text>
  <text x="530" y="152" fill="#8aa0b4" font-size="12" text-anchor="middle">웹 챗 UI (index.html)</text>

  <!-- arrow user<->api -->
  <line x1="530" y1="166" x2="530" y2="210" stroke="#7fa8c9" stroke-width="2" marker-end="url(#arw)"/>
  <text x="545" y="192" fill="#8aa0b4" font-size="11">질문 / 답변·출처·검증 배지</text>

  <!-- 2) FastAPI -->
  <rect x="400" y="212" width="260" height="66" rx="12" fill="#16212e" stroke="#2f7f6e" stroke-width="1.5"/>
  <text x="530" y="242" fill="#e6edf3" font-size="15" font-weight="600" text-anchor="middle">⚙️ FastAPI 백엔드</text>
  <text x="530" y="264" fill="#8aa0b4" font-size="12" text-anchor="middle">/chat · /health(경고율 계기판) · Pydantic</text>

  <line x1="530" y1="278" x2="530" y2="322" stroke="#7fa8c9" stroke-width="2" marker-end="url(#arw)"/>

  <!-- Verification gate (outbound boundary) -->
  <rect x="60" y="324" width="280" height="92" rx="12" fill="#132029" stroke="#33c3a6" stroke-width="1.5"/>
  <text x="200" y="352" fill="#e6edf3" font-size="14" font-weight="700" text-anchor="middle">🔍 답변 사후 검증 게이트</text>
  <text x="200" y="374" fill="#a7d8cb" font-size="11" text-anchor="middle">수치·날짜·방향·날짜 역할 ↔ 근거 대조</text>
  <text x="200" y="394" fill="#8aa0b4" font-size="10.5" text-anchor="middle">폐지본 인용 감지 · 차단 대신 경고 부착</text>
  <line x1="380" y1="370" x2="348" y2="370" stroke="#33c3a6" stroke-width="2" marker-end="url(#arwg)"/>
  <line x1="200" y1="324" x2="396" y2="250" stroke="#33c3a6" stroke-width="2" marker-end="url(#arwg)"/>
  <text x="216" y="296" fill="#33c3a6" font-size="10.5">검증 결과 부착 후 응답</text>

  <!-- 3) Agent -->
  <rect x="380" y="324" width="300" height="92" rx="12" fill="#182a1f" stroke="#33c3a6" stroke-width="2"/>
  <text x="530" y="352" fill="#e6edf3" font-size="16" font-weight="700" text-anchor="middle">🤖 RA·PV 에이전트</text>
  <text x="530" y="374" fill="#a7d8cb" font-size="11.5" text-anchor="middle">입구 PII 마스킹 · Agentic Loop · Function Calling</text>
  <text x="530" y="394" fill="#8aa0b4" font-size="11" text-anchor="middle">관찰 → 생각 → 도구호출 → 관찰 (최대 6스텝)</text>

  <!-- LLM box (right) -->
  <rect x="720" y="316" width="280" height="60" rx="12" fill="#16212e" stroke="#e0a458" stroke-width="1.5"/>
  <text x="860" y="342" fill="#e6edf3" font-size="14" font-weight="600" text-anchor="middle">🧠 Enterprise LLM API</text>
  <text x="860" y="362" fill="#8aa0b4" font-size="11.5" text-anchor="middle">Claude (선택) — 근거 종합·자연어 생성</text>
  <!-- fallback -->
  <rect x="720" y="384" width="280" height="42" rx="10" fill="#1c2937" stroke="#3a4b5c" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="860" y="410" fill="#8aa0b4" font-size="11.5" text-anchor="middle">키 없으면 ▸ 오프라인 grounded 폴백</text>
  <line x1="680" y1="360" x2="716" y2="350" stroke="#e0a458" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arw)"/>

  <!-- arrow agent -> MCP (MCP protocol) -->
  <line x1="530" y1="416" x2="530" y2="470" stroke="#33c3a6" stroke-width="2.5" marker-end="url(#arwg)"/>
  <text x="545" y="448" fill="#33c3a6" font-size="12" font-weight="600">MCP 프로토콜 (인메모리)</text>

  <!-- 4) MCP server -->
  <rect x="330" y="472" width="400" height="64" rx="12" fill="#132029" stroke="#33c3a6" stroke-width="2"/>
  <text x="530" y="500" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">🔌 FastMCP 서버 · "RA-Assistant"</text>
  <text x="530" y="521" fill="#8aa0b4" font-size="11.5" text-anchor="middle">도구 인자 PII 마스킹 · 명시적 에러 계약(error+available)</text>

  <!-- external MCP client (stdio) -->
  <rect x="770" y="472" width="230" height="64" rx="12" fill="#16212e" stroke="#5b6f83" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="885" y="498" fill="#e6edf3" font-size="12.5" font-weight="600" text-anchor="middle">🖥 외부 MCP 클라이언트</text>
  <text x="885" y="519" fill="#8aa0b4" font-size="10.5" text-anchor="middle">Claude Desktop · Cursor (⇄ stdio)</text>
  <line x1="768" y1="504" x2="734" y2="504" stroke="#5b6f83" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- arrow server -> primitives container -->
  <line x1="530" y1="536" x2="530" y2="568" stroke="#33c3a6" stroke-width="2.5" marker-end="url(#arwg)"/>

  <!-- 5) MCP primitives container -->
  <rect x="50" y="570" width="960" height="204" rx="12" fill="#101a24" stroke="#3a4b5c" stroke-width="1.2"/>
  <text x="70" y="596" fill="#a7c2d8" font-size="13" font-weight="700">🧰 MCP primitive — Tools 6종 · Resource 1 · Prompt 1</text>

  <!-- row 1 -->
  <rect x="70" y="610" width="210" height="58" rx="8" fill="#16212e" stroke="#33c3a6"/>
  <text x="175" y="634" fill="#e6edf3" font-size="12.5" font-weight="600" text-anchor="middle">search_regulations</text>
  <text x="175" y="653" fill="#8aa0b4" font-size="10.5" text-anchor="middle">Tool · 규제문서 검색(RAG)</text>

  <rect x="292" y="610" width="190" height="58" rx="8" fill="#16212e" stroke="#3a4b5c"/>
  <text x="387" y="634" fill="#e6edf3" font-size="12.5" font-weight="600" text-anchor="middle">get_ra_deadlines</text>
  <text x="387" y="653" fill="#8aa0b4" font-size="10.5" text-anchor="middle">Tool · 마감일 조회</text>

  <rect x="494" y="610" width="230" height="58" rx="8" fill="#16212e" stroke="#3a4b5c"/>
  <text x="609" y="634" fill="#e6edf3" font-size="12.5" font-weight="600" text-anchor="middle">get_submission_checklist</text>
  <text x="609" y="653" fill="#8aa0b4" font-size="10.5" text-anchor="middle">Tool · 제출 체크리스트</text>

  <rect x="736" y="610" width="256" height="58" rx="8" fill="#16212e" stroke="#3a4b5c"/>
  <text x="864" y="634" fill="#e6edf3" font-size="12.5" font-weight="600" text-anchor="middle">list_regulation_documents</text>
  <text x="864" y="653" fill="#8aa0b4" font-size="10.5" text-anchor="middle">Tool · 문서 목록</text>

  <!-- row 2 -->
  <rect x="70" y="690" width="230" height="58" rx="8" fill="#16212e" stroke="#33c3a6"/>
  <text x="185" y="714" fill="#e6edf3" font-size="12.5" font-weight="600" text-anchor="middle">assess_adverse_event</text>
  <text x="185" y="733" fill="#8aa0b4" font-size="10.5" text-anchor="middle">Tool · PV 트리아지+인과성+코딩</text>

  <rect x="312" y="690" width="200" height="58" rx="8" fill="#16212e" stroke="#33c3a6"/>
  <text x="412" y="714" fill="#e6edf3" font-size="12.5" font-weight="600" text-anchor="middle">draft_ae_report</text>
  <text x="412" y="733" fill="#8aa0b4" font-size="10.5" text-anchor="middle">Tool · ICSR/KAERS 초안</text>

  <rect x="524" y="690" width="210" height="58" rx="8" fill="#16212e" stroke="#5b6f83" stroke-dasharray="4 3"/>
  <text x="629" y="714" fill="#e6edf3" font-size="12.5" font-weight="600" text-anchor="middle">regulation://{doc_id}</text>
  <text x="629" y="733" fill="#8aa0b4" font-size="10.5" text-anchor="middle">Resource · 문서 원문 열람</text>

  <rect x="746" y="690" width="246" height="58" rx="8" fill="#16212e" stroke="#5b6f83" stroke-dasharray="4 3"/>
  <text x="869" y="714" fill="#e6edf3" font-size="12.5" font-weight="600" text-anchor="middle">pv_case_intake</text>
  <text x="869" y="733" fill="#8aa0b4" font-size="10.5" text-anchor="middle">Prompt · 케이스 처리 SOP 배포</text>

  <!-- arrows primitives -> targets -->
  <line x1="210" y1="774" x2="210" y2="816" stroke="#33c3a6" stroke-width="2.5" marker-end="url(#arwg)"/>
  <text x="222" y="800" fill="#33c3a6" font-size="10.5">search_regulations</text>
  <line x1="540" y1="774" x2="540" y2="816" stroke="#5b7089" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="552" y="800" fill="#8aa0b4" font-size="10.5">assess / draft</text>
  <line x1="860" y1="774" x2="860" y2="836" stroke="#5b7089" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="872" y="806" fill="#8aa0b4" font-size="10.5">deadlines / checklist</text>

  <!-- RAG pipeline box -->
  <rect x="60" y="818" width="300" height="112" rx="12" fill="#101d17" stroke="#33c3a6" stroke-width="1.5"/>
  <text x="80" y="844" fill="#a7d8cb" font-size="13" font-weight="700">📚 RAG 파이프라인</text>
  <text x="80" y="868" fill="#e6edf3" font-size="11.5">질의확장 → 하이브리드(벡터+BM25)</text>
  <text x="80" y="888" fill="#e6edf3" font-size="11.5">→ 리랭킹 v3 (4신호+섹션 prior)</text>
  <text x="80" y="908" fill="#8aa0b4" font-size="10.5">버전 필터: 폐지본 제외 · as_of '당시 현행'</text>

  <!-- PV workflow box -->
  <rect x="390" y="818" width="300" height="112" rx="12" fill="#1d1420" stroke="#c98bd6" stroke-width="1.5"/>
  <text x="410" y="844" fill="#e3c6ea" font-size="13" font-weight="700">💊 PV 워크플로 (규칙 기반·결정론)</text>
  <text x="410" y="868" fill="#e6edf3" font-size="11.5">트리아지(중대성·기한) → 인과성(WHO-UMC)</text>
  <text x="410" y="888" fill="#e6edf3" font-size="11.5">→ 코딩(확정/후보/미코딩 3계층)</text>
  <text x="410" y="908" fill="#8aa0b4" font-size="10.5">→ 초안 전 최소보고요건(ICH E2D) 검증</text>

  <!-- PV -> RAG basis (dashed) -->
  <line x1="388" y1="874" x2="364" y2="874" stroke="#33c3a6" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arwg)"/>
  <text x="376" y="862" fill="#33c3a6" font-size="9.5" text-anchor="middle">근거 회수</text>

  <!-- RA data store -->
  <rect x="720" y="838" width="280" height="70" rx="10" fill="#16212e" stroke="#3a4b5c"/>
  <text x="860" y="866" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">🗂 RA·PV 업무 데이터</text>
  <text x="860" y="887" fill="#8aa0b4" font-size="11" text-anchor="middle">ra_tasks.json (마감일 6건 · 체크리스트 3종)</text>

  <!-- Documents corpus feeding RAG -->
  <rect x="60" y="972" width="300" height="76" rx="10" fill="#141d17" stroke="#2f7f6e"/>
  <text x="210" y="996" fill="#e6edf3" font-size="12.5" font-weight="600" text-anchor="middle">📄 규제문서 코퍼스 13종</text>
  <text x="210" y="1015" fill="#8aa0b4" font-size="10.5" text-anchor="middle">핵심 6 + 하드네거티브 6 + 폐지 구판 1</text>
  <text x="210" y="1033" fill="#8aa0b4" font-size="10" text-anchor="middle">frontmatter: doc_id·버전·시행일·status</text>
  <line x1="210" y1="970" x2="210" y2="934" stroke="#2f7f6e" stroke-width="2" marker-end="url(#arw)"/>

  <!-- footer legend -->
  <text x="420" y="986" fill="#8aa0b4" font-size="11.5">범례:</text>
  <line x1="460" y1="982" x2="492" y2="982" stroke="#33c3a6" stroke-width="2.5" marker-end="url(#arwg)"/>
  <text x="500" y="986" fill="#8aa0b4" font-size="11.5">RAG·검증 핵심 경로</text>
  <line x1="460" y1="1006" x2="492" y2="1006" stroke="#e0a458" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="500" y="1010" fill="#8aa0b4" font-size="11.5">선택/폴백/점선 경로</text>
</svg>
