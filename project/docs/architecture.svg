<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="1020" viewBox="0 0 1060 1020" font-family="'Noto Sans KR','Segoe UI',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b7089" />
    </marker>
    <marker id="arw" markerWidth="12" markerHeight="12" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7fa8c9" />
    </marker>
    <marker id="arwg" markerWidth="12" markerHeight="12" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#33c3a6" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1060" height="1020" fill="#0f1720"/>

  <!-- Title -->
  <text x="40" y="46" fill="#e6edf3" font-size="26" font-weight="700">🧬 RA-Assistant · 시스템 아키텍처</text>
  <text x="42" y="72" fill="#8aa0b4" font-size="14">제약 규제업무(RA)용 RAG + MCP Agentic 어시스턴트 — 모델과 도구를 MCP로 분리(= Hey.GC 2.0 구조)</text>

  <!-- Layer labels (left rail) -->
  <text x="20" y="140" fill="#4f9dff" font-size="12" font-weight="700" transform="rotate(-90 20 140)">사용자·서빙</text>
  <text x="20" y="360" fill="#4f9dff" font-size="12" font-weight="700" transform="rotate(-90 20 360)">에이전트·LLM</text>
  <text x="20" y="560" fill="#4f9dff" font-size="12" font-weight="700" transform="rotate(-90 20 560)">MCP 도구 계층</text>
  <text x="20" y="820" fill="#4f9dff" font-size="12" font-weight="700" transform="rotate(-90 20 820)">데이터·검색</text>

  <!-- 1) User UI -->
  <rect x="410" y="100" width="240" height="66" rx="12" fill="#16212e" stroke="#4f9dff" stroke-width="1.5"/>
  <text x="530" y="130" fill="#e6edf3" font-size="15" font-weight="600" text-anchor="middle">👤 RA 담당자</text>
  <text x="530" y="152" fill="#8aa0b4" font-size="12" text-anchor="middle">웹 챗 UI (index.html)</text>

  <!-- arrow user<->api -->
  <line x1="530" y1="166" x2="530" y2="210" stroke="#7fa8c9" stroke-width="2" marker-end="url(#arw)"/>
  <text x="545" y="192" fill="#8aa0b4" font-size="11">질문 / 답변·출처</text>

  <!-- 2) FastAPI -->
  <rect x="400" y="212" width="260" height="66" rx="12" fill="#16212e" stroke="#2f7f6e" stroke-width="1.5"/>
  <text x="530" y="242" fill="#e6edf3" font-size="15" font-weight="600" text-anchor="middle">⚙️ FastAPI 백엔드</text>
  <text x="530" y="264" fill="#8aa0b4" font-size="12" text-anchor="middle">/chat · /health · Pydantic 스키마</text>

  <line x1="530" y1="278" x2="530" y2="322" stroke="#7fa8c9" stroke-width="2" marker-end="url(#arw)"/>

  <!-- 3) Agent -->
  <rect x="380" y="324" width="300" height="92" rx="12" fill="#182a1f" stroke="#33c3a6" stroke-width="2"/>
  <text x="530" y="354" fill="#e6edf3" font-size="16" font-weight="700" text-anchor="middle">🤖 RA 에이전트</text>
  <text x="530" y="376" fill="#a7d8cb" font-size="12" text-anchor="middle">Agentic Loop · Function Calling</text>
  <text x="530" y="396" fill="#8aa0b4" font-size="11" text-anchor="middle">관찰 → 생각 → 도구호출 → 관찰 (반복)</text>

  <!-- LLM box (right) -->
  <rect x="720" y="316" width="280" height="60" rx="12" fill="#16212e" stroke="#e0a458" stroke-width="1.5"/>
  <text x="860" y="342" fill="#e6edf3" font-size="14" font-weight="600" text-anchor="middle">🧠 Enterprise LLM API</text>
  <text x="860" y="362" fill="#8aa0b4" font-size="11.5" text-anchor="middle">Claude (선택) — 근거 종합·자연어 생성</text>
  <!-- fallback -->
  <rect x="720" y="384" width="280" height="42" rx="10" fill="#1c2937" stroke="#3a4b5c" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="860" y="410" fill="#8aa0b4" font-size="11.5" text-anchor="middle">키 없으면 ▸ 오프라인 grounded 폴백</text>
  <line x1="680" y1="360" x2="716" y2="350" stroke="#e0a458" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arw)"/>

  <!-- arrow agent -> MCP (MCP protocol) -->
  <line x1="530" y1="416" x2="530" y2="470" stroke="#33c3a6" stroke-width="2.5" marker-end="url(#arwg)"/>
  <text x="545" y="448" fill="#33c3a6" font-size="12" font-weight="600">MCP 프로토콜</text>

  <!-- 4) MCP server -->
  <rect x="330" y="472" width="400" height="64" rx="12" fill="#132029" stroke="#33c3a6" stroke-width="2"/>
  <text x="530" y="500" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">🔌 FastMCP 서버 · "RA-Assistant"</text>
  <text x="530" y="521" fill="#8aa0b4" font-size="11.5" text-anchor="middle">도구·리소스를 MCP 규격으로 노출 (stdio / 인메모리)</text>

  <!-- fan-out lines to tools -->
  <line x1="430" y1="536" x2="180" y2="596" stroke="#5b7089" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="490" y1="536" x2="400" y2="596" stroke="#5b7089" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="570" y1="536" x2="640" y2="596" stroke="#5b7089" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="630" y1="536" x2="880" y2="596" stroke="#5b7089" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Tools row -->
  <rect x="60" y="598" width="240" height="66" rx="10" fill="#16212e" stroke="#3a4b5c"/>
  <text x="180" y="626" fill="#e6edf3" font-size="13.5" font-weight="600" text-anchor="middle">search_regulations</text>
  <text x="180" y="646" fill="#8aa0b4" font-size="11" text-anchor="middle">Tool · 규제문서 검색(RAG)</text>

  <rect x="320" y="598" width="220" height="66" rx="10" fill="#16212e" stroke="#3a4b5c"/>
  <text x="430" y="626" fill="#e6edf3" font-size="13.5" font-weight="600" text-anchor="middle">get_ra_deadlines</text>
  <text x="430" y="646" fill="#8aa0b4" font-size="11" text-anchor="middle">Tool · 마감일 조회</text>

  <rect x="560" y="598" width="250" height="66" rx="10" fill="#16212e" stroke="#3a4b5c"/>
  <text x="685" y="626" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">get_submission_checklist</text>
  <text x="685" y="646" fill="#8aa0b4" font-size="11" text-anchor="middle">Tool · 제출 체크리스트</text>

  <rect x="830" y="598" width="170" height="66" rx="10" fill="#16212e" stroke="#5b6f83" stroke-dasharray="4 3"/>
  <text x="915" y="624" fill="#e6edf3" font-size="12" font-weight="600" text-anchor="middle">regulation://{id}</text>
  <text x="915" y="645" fill="#8aa0b4" font-size="11" text-anchor="middle">Resource · 원문</text>

  <!-- arrows tools -> stores -->
  <line x1="180" y1="664" x2="180" y2="726" stroke="#33c3a6" stroke-width="2" marker-end="url(#arwg)"/>
  <line x1="430" y1="664" x2="600" y2="742" stroke="#5b7089" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="685" y1="664" x2="640" y2="742" stroke="#5b7089" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="915" y1="664" x2="915" y2="742" stroke="#5b7089" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- RAG pipeline box -->
  <rect x="60" y="728" width="480" height="120" rx="12" fill="#101d17" stroke="#33c3a6" stroke-width="1.5"/>
  <text x="80" y="752" fill="#a7d8cb" font-size="13" font-weight="700">📚 RAG 파이프라인 (검색 최적화)</text>
  <!-- inner pills -->
  <rect x="76" y="766" width="100" height="60" rx="8" fill="#16212e" stroke="#3a4b5c"/>
  <text x="126" y="792" fill="#e6edf3" font-size="12" text-anchor="middle" font-weight="600">청킹</text>
  <text x="126" y="810" fill="#8aa0b4" font-size="10" text-anchor="middle">구조+overlap</text>
  <rect x="186" y="766" width="100" height="60" rx="8" fill="#16212e" stroke="#3a4b5c"/>
  <text x="236" y="792" fill="#e6edf3" font-size="12" text-anchor="middle" font-weight="600">임베딩</text>
  <text x="236" y="810" fill="#8aa0b4" font-size="10" text-anchor="middle">TF-IDF(교체가능)</text>
  <rect x="296" y="766" width="110" height="60" rx="8" fill="#16212e" stroke="#3a4b5c"/>
  <text x="351" y="792" fill="#e6edf3" font-size="12" text-anchor="middle" font-weight="600">하이브리드</text>
  <text x="351" y="810" fill="#8aa0b4" font-size="10" text-anchor="middle">벡터+BM25</text>
  <rect x="416" y="766" width="110" height="60" rx="8" fill="#16212e" stroke="#33c3a6"/>
  <text x="471" y="792" fill="#e6edf3" font-size="12" text-anchor="middle" font-weight="600">리랭킹</text>
  <text x="471" y="810" fill="#8aa0b4" font-size="10" text-anchor="middle">정밀 재정렬</text>
  <!-- pipeline internal arrows -->
  <line x1="176" y1="796" x2="184" y2="796" stroke="#5b7089" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="286" y1="796" x2="294" y2="796" stroke="#5b7089" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="406" y1="796" x2="414" y2="796" stroke="#5b7089" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RA data store -->
  <rect x="560" y="744" width="250" height="60" rx="10" fill="#16212e" stroke="#3a4b5c"/>
  <text x="685" y="770" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">🗂 RA 업무 데이터</text>
  <text x="685" y="790" fill="#8aa0b4" font-size="11" text-anchor="middle">ra_tasks.json (마감일·체크리스트)</text>

  <!-- Documents -->
  <rect x="830" y="744" width="170" height="60" rx="10" fill="#16212e" stroke="#5b6f83" stroke-dasharray="4 3"/>
  <text x="915" y="770" fill="#e6edf3" font-size="12.5" font-weight="600" text-anchor="middle">📄 규제문서</text>
  <text x="915" y="789" fill="#8aa0b4" font-size="10.5" text-anchor="middle">원문 (.md)</text>

  <!-- Documents corpus feeding RAG -->
  <rect x="60" y="872" width="480" height="60" rx="10" fill="#141d17" stroke="#2f7f6e"/>
  <text x="300" y="898" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">📄 규제문서 코퍼스 6종</text>
  <text x="300" y="918" fill="#8aa0b4" font-size="11" text-anchor="middle">품목허가 · 변경허가 · GMP · 라벨링 · 약물감시(PV) · 임상(IND)</text>
  <line x1="300" y1="872" x2="300" y2="850" stroke="#2f7f6e" stroke-width="2" marker-end="url(#arw)"/>

  <!-- footer legend -->
  <text x="600" y="892" fill="#8aa0b4" font-size="11.5">범례:</text>
  <line x1="640" y1="888" x2="672" y2="888" stroke="#33c3a6" stroke-width="2.5" marker-end="url(#arwg)"/>
  <text x="680" y="892" fill="#8aa0b4" font-size="11.5">RAG 핵심 경로</text>
  <line x1="640" y1="910" x2="672" y2="910" stroke="#e0a458" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="680" y="914" fill="#8aa0b4" font-size="11.5">선택/폴백 경로</text>
</svg>
